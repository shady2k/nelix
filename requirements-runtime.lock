# The RUNTIME's third-party closure, hash-pinned — frozen into every generation by
# runtime.install() (`uv pip install --require-hashes`). Hash pinning is what stops a
# compromised or redirected index substituting a tampered artifact into a generation.
#
# COMPILED FROM pyproject.toml, never hand-edited, and that is the point: this file used to be
# requirements-daemon.lock, compiled from a hand-kept requirements-daemon.in, and the two drifted
# — the .in pinned ptyprocess as a daemon dep when nothing under daemon/ has ever imported it
# (the PTY is stdlib os.openpty + os.login_tty; measured by AST walk 2026-07-17 [nelix-9a4.1]).
# A lock compiled from the package's own [project.dependencies] cannot drift from them, the same
# reason requirements.txt says `-e .` instead of restating them.
# tests/test_runtime_lock.py fails if this file and pyproject.toml disagree.
#
# The core wheel itself is NOT here: it is built, not resolved, so runtime.install() hashes the
# wheel it was handed and folds that hash into the build id.
#
# nelix-9a4.4: nelix_store and nelix_contracts are LOCAL packages that ship as separate wheels
# alongside the core. They are NOT third-party packages and cannot be hash-pinned — they are
# built+installed together with the core wheel, not resolved from an index.
#
# Regenerate after changing pyproject.toml's dependencies:
#   uv pip compile pyproject.toml --generate-hashes --no-header --python-version 3.11 \
#     -o requirements-runtime.lock
