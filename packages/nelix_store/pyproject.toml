[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nelix-store"
version = "0.1.0"
description = "Generation-neutral durable state for nelix: session + terminal records, start ledger."
requires-python = ">=3.11"
dependencies = ["nelix-contracts"]

[tool.setuptools.packages.find]
where = ["."]
include = ["nelix_store*"]
