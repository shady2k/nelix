[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nelix-contracts"
version = "0.1.0"
description = "Pure contract types shared by the nelix router, generations and clients."
requires-python = ">=3.11"
dependencies = []

[tool.setuptools.packages.find]
where = ["."]
include = ["nelix_contracts*"]
